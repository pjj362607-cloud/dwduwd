<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 운영체계 스튜디오</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── 변수 ─────────────────────────────────────────────── */
:root {
  /* 공통 */
  --mono: 'DM Mono', monospace;
  --serif: 'Instrument Serif', serif;
  --sans: 'DM Sans', sans-serif;
}

/* ── 고객 테마 ── */
.world-customer {
  --bg:      #faf9f7;
  --surface: #ffffff;
  --border:  #e8e4df;
  --border2: #d4cfc9;
  --text:    #1a1714;
  --sub:     #6b6560;
  --accent:  #1a1714;
  --accent2: #c17c3a;
  --ok:      #2d7a47;
  --warn:    #b45309;
  --err:     #c0392b;
  --muted:   #9e9891;
}

/* ── 관리자 테마 ── */
.world-admin {
  --bg:      #080c10;
  --surface: #0e1419;
  --border:  #1e2a35;
  --border2: #2a3a47;
  --text:    #c8d8e4;
  --sub:     #4a6070;
  --accent:  #00d4ff;
  --accent2: #ff6b35;
  --ok:      #00e676;
  --warn:    #ffd600;
  --err:     #ff3d3d;
  --muted:   #3a5060;
}

/* ── 리셋 ─────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--text);transition:background .2s,color .2s}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── 공통 버튼 ─────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.25rem;border-radius:4px;
     font-family:var(--sans);font-size:.85rem;font-weight:500;cursor:pointer;border:1px solid transparent;
     transition:all .15s;text-decoration:none;line-height:1}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* 고객용 버튼 */
.world-customer .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.world-customer .btn-primary:hover{background:#333}
.world-customer .btn-ghost{background:transparent;border-color:var(--border2);color:var(--sub)}
.world-customer .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.world-customer .btn-outline{background:transparent;border-color:var(--accent);color:var(--accent)}
.world-customer .btn-outline:hover{background:var(--accent);color:#fff}

/* 관리자용 버튼 */
.world-admin .btn-primary{background:var(--accent);color:#000;border-color:var(--accent)}
.world-admin .btn-primary:hover{background:#00b8d9}
.world-admin .btn-ghost{background:transparent;border-color:var(--border2);color:var(--text)}
.world-admin .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.world-admin .btn-danger{background:transparent;border-color:var(--err);color:var(--err)}
.world-admin .btn-danger:hover{background:rgba(255,61,61,.1)}

/* ── 공통 카드 ─────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.5rem}
.card-sm{padding:1rem}
.card-xs{padding:.75rem}

/* ── 인풋 ─────────────────────────────────────────────── */
input,select,textarea{
  background:var(--surface);border:1px solid var(--border2);border-radius:6px;
  color:var(--text);font-family:var(--sans);font-size:.9rem;padding:.65rem .9rem;
  width:100%;transition:border-color .15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:var(--surface)}
label{display:block;font-size:.8rem;font-weight:500;color:var(--sub);margin-bottom:.4rem}

/* ── 태그 ─────────────────────────────────────────────── */
.tag{display:inline-flex;align-items:center;gap:.25rem;font-family:var(--mono);font-size:.65rem;
     padding:.2rem .55rem;border-radius:3px;border:1px solid;font-weight:500;letter-spacing:.04em}
.world-admin .tag-high{color:var(--err);border-color:var(--err);background:rgba(255,61,61,.07)}
.world-admin .tag-med{color:var(--warn);border-color:var(--warn);background:rgba(255,214,0,.07)}
.world-admin .tag-low{color:var(--sub);border-color:var(--border2);background:transparent}
.world-admin .tag-ok{color:var(--ok);border-color:var(--ok);background:rgba(0,230,118,.07)}

/* ── 알림 박스 ─────────────────────────────────────────── */
.alert{padding:.75rem 1rem;border-radius:6px;font-size:.85rem;line-height:1.5;border:1px solid}
.world-customer .alert-err{background:#fef2f2;border-color:#fca5a5;color:#991b1b}
.world-customer .alert-ok{background:#f0fdf4;border-color:#86efac;color:#166534}
.world-customer .alert-info{background:#eff6ff;border-color:#93c5fd;color:#1d4ed8}
.world-customer .alert-warn{background:#fffbeb;border-color:#fcd34d;color:#92400e}
.world-admin .alert-err{border-color:rgba(255,61,61,.3);background:rgba(255,61,61,.06);color:var(--err)}
.world-admin .alert-ok{border-color:rgba(0,230,118,.3);background:rgba(0,230,118,.06);color:var(--ok)}
.world-admin .alert-info{border-color:rgba(0,212,255,.3);background:rgba(0,212,255,.06);color:var(--accent)}
.world-admin .alert-warn{border-color:rgba(255,214,0,.3);background:rgba(255,214,0,.06);color:var(--warn)}

/* ── 스피너 ─────────────────────────────────────────────── */
.spin{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);
      border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 구분선 ─────────────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:1.25rem 0}

/* ────────────────────────────────────────────────────────
   고객 레이아웃
──────────────────────────────────────────────────────── */
.c-root{min-height:100%;display:flex;flex-direction:column}

.c-header{padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;
           border-bottom:1px solid var(--border);background:var(--surface)}
.c-logo{font-family:var(--serif);font-size:1.2rem;letter-spacing:-.01em;color:var(--text)}
.c-logo span{font-style:italic;color:var(--accent2)}

.c-main{flex:1;padding:2.5rem 1.5rem}
.c-wrap{max-width:640px;margin:0 auto}
.c-wrap-wide{max-width:900px;margin:0 auto}

.c-page-title{font-family:var(--serif);font-size:2rem;line-height:1.2;margin-bottom:.5rem;letter-spacing:-.02em}
.c-page-sub{color:var(--sub);font-size:.9rem;line-height:1.6;margin-bottom:2rem}

.c-footer{padding:1.5rem;text-align:center;border-top:1px solid var(--border);
           font-size:.78rem;color:var(--muted)}

/* 스텝 표시 */
.c-steps{display:flex;align-items:center;gap:.5rem;margin-bottom:2.5rem;flex-wrap:wrap}
.c-step{display:flex;align-items:center;gap:.4rem}
.c-step-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;
             justify-content:center;font-size:.65rem;font-weight:700;border:1.5px solid var(--border2);color:var(--muted)}
.c-step-dot.done{background:var(--ok);border-color:var(--ok);color:#fff}
.c-step-dot.active{background:var(--accent);border-color:var(--accent);color:#fff}
.c-step-label{font-size:.78rem;color:var(--muted)}
.c-step-label.active{color:var(--text);font-weight:600}
.c-step-sep{font-size:.7rem;color:var(--border2)}

/* 선택 카드 */
.c-opt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.75rem}
.c-opt{padding:1rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;
        transition:all .15s;background:var(--surface)}
.c-opt:hover{border-color:var(--border2)}
.c-opt.sel{border-color:var(--accent);background:var(--bg)}
.c-opt-title{font-weight:600;font-size:.88rem;margin-bottom:.25rem}
.c-opt-sub{font-size:.75rem;color:var(--sub);line-height:1.4}

/* 추천 결과 */
.c-rec{border:2px solid var(--accent2);border-radius:10px;padding:1.75rem;background:var(--surface)}
.c-rec-type{display:inline-block;font-size:.75rem;font-weight:700;padding:.3rem .8rem;
             border-radius:4px;margin-bottom:.75rem;letter-spacing:.04em}
.c-rec-engine{font-family:var(--serif);font-size:1.6rem;margin-bottom:.4rem;letter-spacing:-.02em}
.c-rec-desc{font-size:.85rem;color:var(--sub);line-height:1.6;margin-bottom:1.25rem}
.c-rec-rows{display:flex;gap:1.5rem;flex-wrap:wrap}
.c-rec-item{display:flex;flex-direction:column;gap:.2rem}
.c-rec-key{font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.c-rec-val{font-size:.88rem;font-weight:500}
.c-price{font-family:var(--mono);font-size:1.15rem;font-weight:500;color:var(--accent2);margin-top:.75rem}

/* 상태 뱃지 */
.c-status{display:inline-flex;align-items:center;gap:.5rem;padding:.4rem .9rem;
           border-radius:20px;font-size:.82rem;font-weight:600}
.c-status.접수됨{background:#eff6ff;color:#1d4ed8}
.c-status.검토중{background:#fffbeb;color:#92400e}
.c-status.설정중{background:#faf5ff;color:#6b21a8}
.c-status.완료{background:#f0fdf4;color:#166534}
.c-status.추가정보필요{background:#fff7ed;color:#9a3412}

/* 진행 표시 */
.c-progress{display:flex;flex-direction:column;gap:.75rem;margin:1.5rem 0}
.c-prog-item{display:flex;align-items:center;gap:.75rem}
.c-prog-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
             justify-content:center;font-size:.75rem;flex-shrink:0}
.c-prog-dot.done{background:var(--ok);color:#fff}
.c-prog-dot.active{background:var(--accent2);color:#fff}
.c-prog-dot.pending{background:var(--border);color:var(--muted)}
.c-prog-label{font-size:.88rem;font-weight:500}
.c-prog-sub{font-size:.75rem;color:var(--sub)}

/* ────────────────────────────────────────────────────────
   관리자 레이아웃
──────────────────────────────────────────────────────── */
.a-root{height:100%;display:flex;flex-direction:column}

.a-header{display:flex;align-items:center;gap:1rem;padding:.7rem 1.25rem;
           border-bottom:1px solid var(--border);background:var(--surface);
           position:sticky;top:0;z-index:100;flex-shrink:0}
.a-logo{font-family:var(--mono);font-size:.8rem;font-weight:500;color:var(--accent);
         white-space:nowrap;letter-spacing:.06em}
.a-nav{display:flex;gap:.15rem;flex:1}
.a-nav-btn{padding:.38rem .75rem;border-radius:3px;font-size:.78rem;font-weight:500;
            cursor:pointer;border:none;background:transparent;color:var(--sub);
            font-family:var(--sans);transition:all .15s}
.a-nav-btn:hover{color:var(--text);background:rgba(255,255,255,.05)}
.a-nav-btn.active{color:var(--accent);background:rgba(0,212,255,.08)}
.a-header-end{display:flex;align-items:center;gap:.75rem;margin-left:auto}
.a-status{width:6px;height:6px;border-radius:50%;background:var(--ok);
           box-shadow:0 0 6px var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.a-settings-btn{font-family:var(--mono);font-size:.65rem;color:var(--sub);
                  border:1px solid var(--border);padding:.2rem .55rem;border-radius:2px;
                  cursor:pointer;white-space:nowrap;background:transparent;
                  max-width:180px;overflow:hidden;text-overflow:ellipsis}
.a-settings-btn:hover{border-color:var(--accent);color:var(--accent)}

.a-body{flex:1;overflow-y:auto;padding:1.5rem}
.a-wrap{max-width:1200px;margin:0 auto}
.a-wrap-narrow{max-width:760px;margin:0 auto}

.a-sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;gap:1rem;flex-wrap:wrap}
.a-sec-title{font-size:.95rem;font-weight:700}
.a-sec-sub{font-size:.72rem;color:var(--sub);margin-top:.1rem}

/* 통계 */
.a-stat{background:var(--surface);border:1px solid var(--border);border-radius:6px;
         padding:1rem;position:relative;overflow:hidden}
.a-stat-label{font-size:.65rem;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.35rem}
.a-stat-val{font-size:1.9rem;font-weight:800;line-height:1;letter-spacing:-.03em}
.a-stat-sub{font-size:.68rem;color:var(--sub);margin-top:.25rem}
.a-stat-bar{position:absolute;bottom:0;left:0;right:0;height:2px}

/* 테이블 */
.a-table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.78rem}
th{font-family:var(--mono);font-size:.63rem;text-transform:uppercase;letter-spacing:.08em;
   color:var(--sub);padding:.55rem .7rem;border-bottom:1px solid var(--border);text-align:left;font-weight:400}
td{padding:.55rem .7rem;border-bottom:1px solid rgba(30,42,53,.6);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.td-mono{font-family:var(--mono);font-size:.68rem;color:var(--sub)}
.td-clip{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
           display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:8px;
        width:100%;max-width:480px;max-height:80vh;overflow-y:auto;padding:1.5rem}
.modal-title{font-size:.95rem;font-weight:700;margin-bottom:1.25rem;
              display:flex;justify-content:space-between;align-items:center}
.close-x{background:none;border:none;color:var(--sub);cursor:pointer;font-size:1.1rem;line-height:1}
.close-x:hover{color:var(--text)}

/* 타임라인 */
.a-tl{display:flex;flex-direction:column}
.a-tl-item{display:flex;gap:.9rem;padding:.65rem 0;position:relative}
.a-tl-item::before{content:'';position:absolute;left:11px;top:30px;bottom:-8px;
                    width:1px;background:var(--border)}
.a-tl-item:last-child::before{display:none}
.a-tl-dot{width:23px;height:23px;border-radius:50%;border:2px solid var(--border2);
           background:var(--surface);flex-shrink:0;display:flex;align-items:center;
           justify-content:center;font-size:.6rem;margin-top:2px}
.a-tl-dot.ok{border-color:var(--ok);background:rgba(0,230,118,.1);color:var(--ok)}
.a-tl-dot.fail{border-color:var(--err);background:rgba(255,61,61,.1);color:var(--err)}
.a-tl-dot.info{border-color:var(--accent);background:rgba(0,212,255,.1);color:var(--accent)}
.a-tl-title{font-size:.8rem;font-weight:700;margin-bottom:.1rem}
.a-tl-meta{font-family:var(--mono);font-size:.63rem;color:var(--sub)}

/* 그리드 */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
@media(max-width:900px){.grid4{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ══════════════════════════════════════════════════════════
// 라우터 (해시 기반)
// ══════════════════════════════════════════════════════════
const useRouter = () => {
  const [path, setPath] = useState(() => window.location.hash.replace('#','') || '/');
  useEffect(() => {
    const onHash = () => setPath(window.location.hash.replace('#','') || '/');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  const go = (p) => { window.location.hash = p; };
  return { path, go };
};

// ══════════════════════════════════════════════════════════
// 인증 (관리자 PIN — 간단한 세션 게이트)
// ══════════════════════════════════════════════════════════
const ADMIN_PIN = '0000'; // 실서비스: 환경변수 또는 서버 토큰으로 교체
const isAdmin = () => sessionStorage.getItem('admin_auth') === '1';
const setAdmin = () => sessionStorage.setItem('admin_auth', '1');
const clearAdmin = () => sessionStorage.removeItem('admin_auth');

// ══════════════════════════════════════════════════════════
// API 클라이언트
// ══════════════════════════════════════════════════════════
const getApiUrl = () => {
  const stored = localStorage.getItem('api_url');
  if (stored) return stored;
  // Render: 같은 도메인에서 서빙되므로 경로만 사용 (빈 문자열)
  return '';
};

// 고객용 호출 — 에러를 사람 말로 변환
const customerFetch = async (path, opts = {}) => {
  try {
    const res = await fetch(getApiUrl() + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts,
    });
    const data = await res.json();
    if (!res.ok) throw new Error('SERVER_ERROR');
    return data;
  } catch (e) {
    // 2층 오류: 내부 메시지는 console에만
    console.error('[API Error]', e);
    throw new Error('CUSTOMER_ERROR');
  }
};

// 관리자용 호출 — 에러 원문 허용
const adminFetch = async (path, opts = {}) => {
  const res = await fetch(getApiUrl() + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || res.statusText);
  return data;
};

// 고객 에러 메시지 변환
const friendlyError = (code) => ({
  SERVER_ERROR:   '주문 요청을 처리하지 못했습니다. 잠시 후 다시 시도해주세요.',
  CUSTOMER_ERROR: '연결에 문제가 발생했습니다. 잠시 후 다시 시도해주세요.',
  MISSING_FIELD:  '입력 정보를 다시 확인해주세요.',
  NETWORK:        '네트워크 연결을 확인해주세요.',
})[code] || '주문을 처리하는 중 문제가 발생했습니다. 잠시 후 다시 시도해주세요.';

// publicOrderId 생성
const genPublicId = () => {
  const ts = Date.now().toString(36).toUpperCase();
  const rd = Math.random().toString(36).slice(2,5).toUpperCase();
  return `ORD-${ts}-${rd}`;
};

// 내부 용어 → 고객 언어 변환
const LABEL = {
  STANDARD: '바로 시작 가능',
  SEMI:     '검수 후 진행',
  CUSTOM:   '프로젝트 접수 후 진행',
  shared:   '서비스 연결 방식 사용',
  customer: '고객 API 직접 연결',
  hybrid:   '혼합 방식',
  web:      '웹 기반',
  local:    '로컬 설치',
  self:     '자체 운영',
  managed:  '관리형 운영',
  접수됨:   '접수됨',
  검토중:   '검토 중',
  설정중:   '설정 진행 중',
  완료:     '완료',
  추가정보필요: '추가 정보가 필요합니다',
};

// 내부 상태 → 고객 상태 변환
const toCustomerStatus = (state) => {
  if (!state) return '접수됨';
  if (state.includes('ordered') || state.includes('intake') || state === 'configuring') return '접수됨';
  if (state.includes('verification') || state.includes('quoted') || state.includes('reviewing')) return '검토중';
  if (state.includes('install') || state.includes('connect') || state.includes('package') || state.includes('license') || state.includes('delivery')) return '설정중';
  if (state === 'running' || state === 'completed' || state === 'converted') return '완료';
  if (state.includes('failed') || state.includes('declined')) return '추가정보필요';
  return '접수됨';
};

// ══════════════════════════════════════════════════════════
// 분류 엔진 (오프라인 동작)
// ══════════════════════════════════════════════════════════
const classify = ({ problem_domain, user_scope, data_sensitivity, api_mode, tech_readiness }) => {
  if (user_scope === 'org_wide' || data_sensitivity === 'high' ||
      (problem_domain === 'workflow' && user_scope !== 'individual')) return 'CUSTOM';
  if (api_mode === 'customer' || data_sensitivity === 'medium' ||
      tech_readiness === 'none' || tech_readiness === 'basic') return 'SEMI';
  return 'STANDARD';
};

const recommend = (problem, config) => {
  const system_type = classify({ ...problem, ...config });
  const engines = {
    cs_automation: '고객 응대 AI', data_analysis: '데이터 분석 AI',
    document_processing: '문서 처리 AI', workflow: '업무 자동화 AI',
  };
  const descs = {
    STANDARD: '별도 검수 없이 바로 시작할 수 있습니다.',
    SEMI:     '환경을 간단히 확인한 후 빠르게 시작합니다.',
    CUSTOM:   '요구사항을 함께 정의한 후 맞춤형으로 구축합니다.',
  };
  const ranges = { STANDARD:[300000,800000], SEMI:[800000,3000000], CUSTOM:[3000000,0] };
  const [mn,mx] = ranges[system_type];
  return {
    system_type,
    engine: engines[problem.problem_domain] || 'AI 어시스턴트',
    description: descs[system_type],
    price: mx > 0 ? `₩${(mn/10000).toFixed(0)}만 ~ ₩${(mx/10000).toFixed(0)}만` : `₩${(mn/10000).toFixed(0)}만~`,
  };
};

  const PROG_STEPS = [
    { key:'접수됨',   label:'접수 완료',     sub:'주문이 접수되었습니다' },
    { key:'검토중',   label:'검토 중',       sub:'담당자가 확인하고 있습니다' },
    { key:'설정중',   label:'설정 진행 중',  sub:'시스템을 구성하고 있습니다' },
    { key:'완료',     label:'완료',          sub:'사용 준비가 완료되었습니다' },
  ];

  const stepIdx = status ? PROG_STEPS.findIndex(s => s.key === status.customerStatus) : -1;

  return (
    <div className="c-main"><div className="c-wrap">
      <h2 className="c-page-title">주문 진행 상태</h2>
      <p className="c-page-sub">주문 번호로 현재 진행 상황을 확인하세요.</p>

      {err && <div className="alert alert-err" style={{marginBottom:'1rem'}}>{friendlyError(err)}</div>}

      <div style={{display:'flex',gap:'.5rem',marginBottom:'1.5rem'}}>
        <input placeholder="주문번호 입력 (예: ORD-ABC123-XYZ)" value={inputId}
          onChange={e=>setInputId(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&lookup()} style={{flex:1}} />
        <button className="btn btn-outline" onClick={lookup} disabled={loading}>
          {loading ? <span className="spin"/> : '조회'}
        </button>
      </div>

      {status && (
        <div>
          <div className="card" style={{marginBottom:'1rem'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                          marginBottom:'1rem',flexWrap:'wrap',gap:'.5rem'}}>
              <div>
                <div style={{fontSize:'.75rem',color:'var(--muted)',marginBottom:'.2rem'}}>주문번호</div>
                <div style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:'1rem'}}>{status.publicOrderId}</div>
              </div>
              <span className={`c-status ${status.customerStatus.replace(/\s/g,'')}`}>
                {/* 상태 아이콘 */}
                {status.customerStatus === '완료' ? '✓' :
                 status.customerStatus === '추가정보필요' ? '!' : '○'}
                &nbsp;{status.customerStatus}
              </span>
            </div>

            {/* 진행 단계 — 고객 언어로만 */}
            <div className="c-progress">
              {PROG_STEPS.map((s,i) => (
                <div key={i} className="c-prog-item">
                  <div className={`c-prog-dot ${i < stepIdx ? 'done' : i === stepIdx ? 'active' : 'pending'}`}>
                    {i < stepIdx ? '✓' : i+1}
                  </div>
                  <div>
                    <div className="c-prog-label" style={{color: i <= stepIdx ? 'var(--text)' : 'var(--muted)'}}>{s.label}</div>
                    {i === stepIdx && <div className="c-prog-sub">{s.sub}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>

          {status.nextAction && (
            <div className="alert alert-info">{status.nextAction}</div>
          )}
        </div>
      )}

      {!status && !err && (
        <div style={{textAlign:'center',padding:'3rem',color:'var(--muted)'}}>
          <div style={{fontSize:'2rem',marginBottom:'.5rem'}}>○</div>
          <div style={{fontSize:'.85rem'}}>주문번호를 입력하면 진행 상황을 확인할 수 있습니다</div>
          <button className="btn btn-ghost" style={{marginTop:'1rem'}}
            onClick={() => go('/configure/step-1')}>새 주문 신청하기</button>
        </div>
      )}
    </div></div>
  );
};

const AdminDashboard = ({ setAPage, setDetailOrder }) => {
  const [summary, setSummary] = useState(null);

  return (

          { label:'RUNNING', val: summary ? (summary.running_success_rate||0)+'%' : '—', color:'var(--ok)', sub:'진입 성공률' },

          <div key={i} className="a-stat">

                <div style={{fontSize:'.65rem',color:'var(--sub)',textTransform:'uppercase',letterSpacing:'.06em'}}>{k}</div>
              </div>
            ))}

      {/* 최근 이벤트 */}

        <div className="a-sec-hd" style={{marginBottom:'.75rem'}}>

// ── 관리자 티켓 큐 ────────────────────────────────────────
const AdminTickets = () => {
  const [tickets, setTickets] = useState([]);
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState('OPEN');
  const [selected, setSelected] = useState(null);
  const [note, setNote] = useState('');

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const r = await adminFetch(`/ai-product/tickets?status=${status}&limit=100`);
      setTickets(r.tickets || []);
    } catch { setTickets([]); }
    finally { setLoading(false); }
  }, [status]);

  useEffect(() => { load(); }, [load]);

  const resolve = async () => {
    if (!selected || !note) return;
    try {
      await adminFetch(`/ai-product/tickets/${selected.ticket_id}/resolve`, {
        method:'POST', body: JSON.stringify({ resolution_note: note }),
      });
      setSelected(null); setNote(''); load();
    } catch(e) { alert(e.message); }
  };

  const STATUS_LIST = ['OPEN','ASSIGNED','IN_PROGRESS','RESOLVED','CLOSED'];
  const levelColor = l => l==='high'||l==='blocking' ? 'var(--err)' : l==='medium' ? 'var(--warn)' : 'var(--sub)';

  return (
    <div className="a-body"><div className="a-wrap">
      <div className="a-sec-hd">
        <div><div className="a-sec-title">티켓 큐</div>
          <div className="a-sec-sub">예외 처리 — 관리자 전용</div></div>
        <div style={{display:'flex',gap:'.35rem',flexWrap:'wrap'}}>
          {STATUS_LIST.map(s => (
            <button key={s} className={`btn ${status===s?'btn-primary':'btn-ghost'}`}
              style={{padding:'.3rem .65rem',fontSize:'.7rem'}}
              onClick={()=>setStatus(s)}>{s}</button>
          ))}
          <button className="btn btn-ghost" onClick={load} disabled={loading}>↻</button>
        </div>
      </div>

      <div className="card">
        <div className="a-table-wrap">
          <table>
            <thead><tr>
              <th>생성</th><th>유형</th><th>이벤트</th>
              <th>고객</th><th>레벨</th><th>담당자</th><th>요약</th><th></th>
            </tr></thead>
            <tbody>
              {tickets.length === 0 && (
                <tr><td colSpan={8} style={{textAlign:'center',padding:'2rem',color:'var(--sub)'}}>
                  {loading ? '로딩 중...' : !getApiUrl() ? '⚙ API 서버를 먼저 설정하세요' : `${status} 티켓 없음`}
                </td></tr>
              )}
              {tickets.map((t,i) => (
                <tr key={i}>
                  <td className="td-mono">{new Date(t.created_at).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
                  <td className="td-mono" style={{fontSize:'.65rem'}}>{t.ticket_type}</td>
                  <td style={{fontSize:'.75rem',fontWeight:600,maxWidth:'140px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.event_name}</td>
                  <td className="td-mono">{t.customer_id||'—'}</td>
                  <td><span style={{fontFamily:'var(--mono)',fontSize:'.68rem',color:levelColor(t.event_level)}}>{t.event_level}</span></td>
                  <td className="td-mono">{t.assignee||'미배정'}</td>
                  <td className="td-clip" style={{fontSize:'.72rem',color:'var(--sub)',maxWidth:'160px'}}>{t.payload_summary||'—'}</td>
                  <td>
                    {['OPEN','ASSIGNED','IN_PROGRESS'].includes(t.status) && (
                      <button className="btn btn-ghost" style={{padding:'.22rem .5rem',fontSize:'.68rem'}}
                        onClick={()=>{setSelected(t);setNote('');}}>처리</button>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* 처리 모달 */}
      {selected && (
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setSelected(null)}>
          <div className="modal">
            <div className="modal-title">
              <span>티켓 처리</span>
              <button className="close-x" onClick={()=>setSelected(null)}>✕</button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'.4rem',marginBottom:'1rem',fontSize:'.78rem'}}>
              {[['ticket_id',selected.ticket_id],['event_name',selected.event_name],
                ['object_id',selected.object_id],['원인',selected.payload_summary||'—']].map(([k,v])=>(
                <div key={k} style={{display:'flex',gap:'1rem',borderBottom:'1px solid var(--border)',paddingBottom:'.35rem'}}>
                  <span style={{color:'var(--sub)',minWidth:'80px',fontFamily:'var(--mono)',fontSize:'.68rem'}}>{k}</span>
                  <span style={{fontFamily:'var(--mono)',fontSize:'.7rem',wordBreak:'break-all'}}>{v}</span>
                </div>
              ))}
            </div>
            <label>처리 내용</label>
            <textarea rows={3} placeholder="처리 내용을 입력하세요" value={note} onChange={e=>setNote(e.target.value)} />
            <div style={{display:'flex',gap:'.5rem',marginTop:'1rem',justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setSelected(null)}>취소</button>
              <button className="btn btn-primary" onClick={resolve} disabled={!note}>해결 완료</button>
            </div>
          </div>
        </div>
      )}
    </div></div>
  );
};

// ── 관리자 앱 ────────────────────────────────────────────
const AdminApp = () => {
  const [authed, setAuthed] = useState(isAdmin());
  const [aPage, setAPage] = useState('dashboard');

  if (!authed) return (
    <div className="world-admin" style={{height:'100%'}}>
      <AdminGate onAuth={() => setAuthed(true)} />
    </div>
  );

  const pages = {
    dashboard: <AdminDashboard setAPage={setAPage} />,
    events:    <AdminEvents />,
    tickets:   <AdminTickets />,
  };

  return (
    <div className="world-admin a-root">
      <AHeader aPage={aPage} setAPage={setAPage} />
      {pages[aPage] || pages.dashboard}
    </div>
  );
};

// ══════════════════════════════════════════════════════════
// App 루트 — 라우터
// ══════════════════════════════════════════════════════════
const App = () => {
  const { path, go } = useRouter();

  // /admin/* → 관리자 세계
  if (path.startsWith('/admin')) {
    return <AdminApp />;
  }

  // 고객 상태 공유 (Step 간 이동)
  const [form, setForm] = useState({
    problem_domain:'', user_scope:'',
    api_mode:'shared', data_sensitivity:'low', tech_readiness:'advanced',
  });
  const [rec, setRec] = useState(null);

  const pages = {
    '/':                   <Landing go={go} />,
    '/configure/step-1':   <Step1 go={go} form={form} setForm={setForm} />,
    '/configure/step-2':   <Step2 go={go} form={form} setForm={setForm} />,
    '/configure/result':   <ConfigResult go={go} form={form} setRec={setRec} />,
    '/order/confirm':      <OrderConfirm go={go} form={form} rec={rec} />,
    '/order/status':       <OrderStatus go={go} />,
  };

  // 404: 랜딩으로
  const page = pages[path] || <Landing go={go} />;

  return (
    <div className="world-customer c-root">
      <CHeader go={go} />
      {page}
      <footer className="c-footer">
        © 2026 AI운영체계 스튜디오 &nbsp;·&nbsp;
        <a href="#/admin" style={{color:'var(--muted)',textDecoration:'none'}}>관리자</a>
      </footer>
    </div>
  );
};

// 상태를 최상단에 유지하기 위해 App을 래핑
const Root = () => {
  const { path } = useRouter();
  if (path.startsWith('/admin')) return <AdminApp />;
  return <CustomerShell />;
};

const CustomerShell = () => {
  const { path, go } = useRouter();
  const [form, setForm] = useState({
    problem_domain:'', user_scope:'',
    api_mode:'shared', data_sensitivity:'low', tech_readiness:'advanced',
  });
  const [rec, setRec] = useState(null);

  const pages = {
    '/':                   <Landing go={go} />,
    '/configure/step-1':   <Step1 go={go} form={form} setForm={setForm} />,
    '/configure/step-2':   <Step2 go={go} form={form} setForm={setForm} />,
    '/configure/result':   <ConfigResult go={go} form={form} setRec={setRec} />,
    '/order/confirm':      <OrderConfirm go={go} form={form} rec={rec} />,
    '/order/status':       <OrderStatus go={go} />,
  };

  return (
    <div className="world-customer c-root">
      <CHeader go={go} />
      {pages[path] || <Landing go={go} />}
      <footer className="c-footer">
        © 2026 AI운영체계 스튜디오 &nbsp;·&nbsp;
        <a href="#/admin" style={{color:'var(--muted)',textDecoration:'none',fontSize:'.72rem'}}>운영자</a>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
